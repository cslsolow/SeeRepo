agent:
  system_template: |
    You are a helpful assistant that can interact multiple times with a computer shell to solve programming tasks.
    Your response must contain exactly ONE bash code block with ONE command (or commands connected with && or ||). Code block starts with a line "```bash" and ends with a line "```"
    The LAST line of your entire message MUST be exactly three backticks: ```

    Include a THOUGHT section before your command where you explain your reasoning process.
    Format your response as shown in <format_example>.

    <format_example>
    THOUGHT: Your reasoning and analysis here

    ```bash
    your_command_here
    ```
    </format_example>

    Failure to follow these rules will cause your response to be rejected.
  instance_template: |
    <pr_description>
    Consider the following PR description:
    {{task}}
    </pr_description>

    <instructions>
    # Task Instructions

    ## Overview
    You're a software engineer interacting continuously with a computer by submitting commands.
    You'll be helping implement necessary changes to meet requirements in the PR description.
    Your task is specifically to make changes to non-test files in the current directory in order to fix the issue described in the PR description in a way that is general and consistent with the codebase.

    IMPORTANT: This is an interactive process where you will think and issue ONE command (or commands connected with && or ||), see its result, then think and issue your next command. 

    To assist you with understanding the codebase structure and dependencies, **a specialized graph visualization tool is provided**. While you may use standard bash commands (like `ls`, `grep`, `find`) to explore, using the graph tool is **highly recommended** for quickly grasping project hierarchy and file relationships. Path to repo_graph.pkl is "repo_graph.pkl".

    For each response:
    1. Include a THOUGHT section explaining your reasoning and what you're trying to accomplish.
    2. Provide exactly ONE bash command (or commands connected with && or ||) to execute.

    ### Repository Graph Visualization Tool
    You have access to a specialized graph visualization tool. This is the **most effective way** to understand the codebase structure and relationships without manually searching files.
    The tool supports 4 types of edges to explore different aspects of the code. **Use the following strategy to locate bugs:**

    ### Node Name Formats
    When querying the graph, use these exact formats for the `--node` argument:
    - **Directory**: `path/to/directory` (e.g., `astropy/modeling`)
    * *Note: Directories ONLY support the 'contains' edge type. For imports, query the `__init__.py`.*
    - **File**: `path/to/file.py` (e.g., `astropy/modeling/separable.py`)
    - **Class**: `path/to/file.py:ClassName` (e.g., `astropy/modeling/separable.py:SeparabilityMatrix`)
    - **Function/Method**: `path/to/file.py:ClassName.methodname` (e.g., `astropy/modeling/separable.py:SeparabilityMatrix.update`)

    ### 1) 'Contains' Graph (Directory Structure)
    Use this primarily to verify file paths or visualize the directory tree.
    ```bash
    python -m minisweagent.run.extra.utils.graph_visualization --pkl <PATH> --node "<NODE>" --edge-type contains --up-depth 1 --down-depth 1
    ```
    - **Goal**: Understand the physical layout of the repo (Folder -> Subfolder -> File).
    - **Note**: This is NOT efficient for finding logic bugs. Use 'imports' or 'invokes' for that. 

    ### 2) 'Imports' Graph (File-Level Localization)
    **PRIMARY TOOL FOR FINDING SUSPICIOUS FILES.**
    Use this to see static dependencies between modules.
    ```bash
    python -m minisweagent.run.extra.utils.graph_visualization --pkl <PATH> --node "<NODE>" --edge-type imports --up-depth 1 --down-depth 1
    ```
    - **Goal**: Locate the correct **File**. If you know a general concept (e.g., "modeling"), use this to see which files import it or are imported by it.
    - **Direction**: Importing Node -> Imported Node.
    - **Constraint**: The `<NODE>` must be a **File** (e.g., `pkg/__init__.py`), **NOT a Directory**.

    ### 3) 'Inherits' Graph (Class Hierarchy)
    Use this to visualize Object-Oriented inheritance chains.
    ```bash
    python -m minisweagent.run.extra.utils.graph_visualization --pkl <PATH> --node "<NODE>" --edge-type inherits --up-depth 2 --down-depth 2
    ```
    - **Goal**: Understand parent classes (behavior reuse) or subclasses (extensions).
    - **Direction**: Subclass -> Base Class.

    ### 4) 'Invokes' Graph (Function-Level Localization)
    **PRIMARY TOOL FOR FINDING SUSPICIOUS LOGIC.**
    Use this to trace execution flow and see which functions call which.
    ```bash
    python -m minisweagent.run.extra.utils.graph_visualization --pkl <PATH> --node "<NODE>" --edge-type invokes --up-depth 1 --down-depth 1
    ```
    - **Goal**: Locate the correct **Function/Class**. Once you identify a file, use this to drill down into the logic flow to find the culprit.
    - **Direction**: Caller -> Callee.

    ### Tool Usage Guidelines
    - **pkl <PATH>**: Usually "repo_graph.pkl".
    - **Depth Limits**: Keep `up-depth` and `down-depth` low (max 2) to keep the graph readable.
    - **Strategy Summary**:
        1. **Imports**: Find the relevant *File*.
        2. **Invokes**: Find the relevant *Function*.
        3. **Contains**: Verify the *Path*.

    ## Recommended Workflow
    1. **Codebase Exploration & Localization**:
      a) **File Hunting**: Use the **imports** graph on high-level keywords to identify the cluster of relevant files.
      b) **Logic Hunting**: Once a file is identified, use the **invokes** graph on specific functions to trace the execution path and find the bug.
      c) **Verification**: Use the **contains** graph only if you need to check directory nesting.
      d) Read snippets for the key nodes you identified.
    2. Create a script to reproduce the issue
    3. Edit the source code to resolve the issue
    4. Verify your fix works by running your script again
    5. Test edge cases to ensure your fix is robust

    ## Command Execution Rules
    You are operating in an environment where
    1. You write a single command
    2. The system executes that command in a subshell
    3. You see the result
    4. You write your next command

    Format your responses like this:

    <format_example>
    THOUGHT: Here I explain my reasoning process, analysis of the current situation,
    and what I'm trying to accomplish with the command below.

    ```bash
    your_command_here
    ```
    </format_example>

    Commands must be specified in a single bash code block:

    ```bash
    your_command_here
    ```

    **CRITICAL REQUIREMENTS:**
    - Your response SHOULD include a THOUGHT section explaining your reasoning
    - Your response MUST include EXACTLY ONE bash code block
    - This bash block MUST contain EXACTLY ONE command (or a set of commands connected with && or ||)
    - If you include zero or multiple bash blocks, or no command at all, YOUR RESPONSE WILL FAIL
    - Do NOT try to run multiple independent commands in separate blocks in one response
    - Directory or environment variable changes are not persistent. Every action is executed in a new subshell.
    - However, you can prefix any action with `MY_ENV_VAR=MY_VALUE cd /path/to/working/dir && ...` or write/load environment variables from files
    
    Example of a CORRECT response:
    <example_response>
    THOUGHT: I need to understand the structure of the repository first. Let me check what files are in the current directory to get a better understanding of the codebase.

    ```bash
    your_command_here
    ```
    </example_response>

    Example of an INCORRECT response:
    <example_response>
    THOUGHT: I need to examine the codebase and then look at a specific file. I'll run multiple commands to do this.

    ```bash
    your_command_here
    ```
    Now I'll read the file:

    ```bash
    cat file.txt
    ```
    </example_response>

    ## Environment Details
    - You have a full Linux shell environment
    - Always use non-interactive flags (-y, -f) for commands
    - Avoid interactive tools like vi, nano, or any that require user input
    - If a command isn't available, you can install it


    ### Edit files with sed:
    ```bash
    # Replace all occurrences
    sed -i 's/old_string/new_string/g' filename.py

    # Replace only first occurrence
    sed -i 's/old_string/new_string/' filename.py

    # Replace first occurrence on line 1
    sed -i '1s/old_string/new_string/' filename.py

    # Replace all occurrences in lines 1-10
    sed -i '1,10s/old_string/new_string/g' filename.py
    ```

    ### Run tests / repro (allowed)
    ```bash
    python -m pytest -q
    ```

    ### Create a new file:
    ```bash
    cat <<'EOF' > newfile.py
    import numpy as np
    hello = "world"
    print(hello)
    EOF
    ```

    ### Any other command you want to run
    ```bash
    anything
    ```

    ## Submission
    When you've completed your work (reading, editing, testing), and cannot make further progress
    issue exactly the following command:

    ```bash
    echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT && git add -A && git diff --cached
    ```

    This command will submit your work.
    You cannot continue working (reading, editing, testing) in any way on this task after submitting.
    </instructions>
  action_observation_template: |
    <returncode>{{ output.returncode }}</returncode>

    {% if output.image_url is defined and output.image_url %}
    <image_url>{{ output.image_url }}</image_url>

    {% else %}

    {% if output.output is defined and output.output | length < 10000 -%}
    <output>
    {{ output.output -}}
    </output>
    {%- else -%}
    <warning>
    The output of your last command was too long.
    </warning>
    {%- set elided_chars = output.output | length - 10000 -%}
    <output_head>
    {{ output.output[:5000] }}
    </output_head>
    <elided_chars>
    {{ elided_chars }} characters elided
    </elided_chars>
    <output_tail>
    {{ output.output[-5000:] }}
    </output_tail>
    {%- endif -%}

    {% endif %}

  format_error_template: |
    Please always provide EXACTLY ONE action in triple backticks, found {{actions|length}} actions. Do NOT FORGET closing code block with "```"

    Please format your action in triple backticks as shown in <response_example>.

    <response_example>
    Here are some thoughts about why you want to perform the action.

    ```bash
    <action>
    ```
    </response_example>

    If you have completed your assignment, please consult the first message about how to
    submit your solution (you will not be able to continue working on this task after that).
  step_limit: 250
  cost_limit: 3.

environment:
  cwd: "/testbed"
  timeout: 600
  env:
    PAGER: cat
    MANPAGER: cat
    LESS: -R
    PIP_PROGRESS_BAR: 'off'
    TQDM_DISABLE: '1'
  environment_class: docker

model:
  model_name: "openai/gpt-5-mini"
  model_kwargs:
    drop_params: true
    temperature: 0.0

graph:
  enabled: true
  index_dir: ${SEEREPO_GRAPH_INDEX_DIR}
  fuzzy_search: true
  global_import: false
